{{define "filter-bar"}}
<div class="flex items-center gap-2 pb-8">
    <a href="?" class="px-3 py-1 rounded text-sm font-medium border {{filterClass .FilterStatus ``}}">All</a>
    <a href="?status=pending"
        class="px-3 py-1 rounded text-sm font-medium border {{filterClass .FilterStatus `pending`}}">Pending</a>
    <a href="?status=running"
        class="px-3 py-1 rounded text-sm font-medium border {{filterClass .FilterStatus `running`}}">Running</a>
    <a href="?status=done"
        class="px-3 py-1 rounded text-sm font-medium border {{filterClass .FilterStatus `done`}}">Done</a>
    <a href="?status=failed"
        class="px-3 py-1 rounded text-sm font-medium border {{filterClass .FilterStatus `failed`}}">Failed</a>
    <div class="ml-auto flex items-center gap-4">
        <input type="search" placeholder="Search..." aria-label="Search jobs"
            class="px-3 py-1 text-sm border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-emerald-500" />
        <div class="flex justify-end">
            <button type="button" aria-haspopup="dialog" aria-controls="newJobDialog"
                onclick="document.getElementById('newJobDialog').showModal()"
                class="px-4 py-2 bg-emerald-500 text-white rounded cursor-pointer hover:bg-emerald-600">New Job</button>
        </div>
    </div>
</div>
{{end}}
