{{define "new-job-dialog"}}
<dialog id="newJobDialog"
    class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 rounded-lg shadow-xl p-0 backdrop:bg-black/50 w-full max-w-md">
    <div class="flex items-center justify-between px-6 py-4 border-b">
        <h2 class="text-lg font-semibold">New Job</h2>
        <button onclick="document.getElementById('newJobDialog').close()"
            class="text-gray-400 hover:text-gray-600 cursor-pointer">&times;</button>
    </div>
    <form method="dialog" class="px-6 py-4 flex flex-col gap-4">
        <div class="flex flex-col gap-1">
            <label for="jobName" class="text-sm font-medium text-gray-700">Job Name</label>
            <input id="jobName" name="name" type="text" placeholder="e.g. nightly-backup"
                class="px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-emerald-500" />
        </div>
        <div class="flex justify-end gap-2">
            <button type="button" onclick="document.getElementById('newJobDialog').close()"
                class="px-4 py-2 text-sm rounded border border-gray-300 hover:bg-gray-100 cursor-pointer">Cancel</button>
            <button type="submit"
                class="px-4 py-2 text-sm bg-emerald-500 text-white rounded hover:bg-emerald-600 cursor-pointer">Create</button>
        </div>
    </form>
</dialog>
<script>
    document.getElementById('newJobDialog').addEventListener('click', function (e) {
        if (e.target === this) this.close();
    });
</script>
{{end}}
