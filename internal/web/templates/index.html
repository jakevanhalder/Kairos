{{template "base.html" .}}

{{define "title"}}Kairos{{end}}

{{define "content"}}
{{template "new-job-dialog" .}}
<div class="flex flex-col gap-10 p-8">
    <div>
        {{template "filter-bar" .}}
        <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th scope="col"
                            class="px-6 py-3 text-left text-xs text-black uppercase font-bold tracking-wider">ID
                        </th>
                        <th scope="col"
                            class="px-6 py-3 text-left text-xs text-black uppercase font-bold tracking-wider">Name
                        </th>
                        <th scope="col"
                            class="px-6 py-3 text-left text-xs text-black uppercase font-bold tracking-wider">
                            Status
                        </th>
                        <th scope="col"
                            class="px-6 py-3 text-left text-xs text-black uppercase font-bold tracking-wider">
                            Started
                            At</th>
                        <th scope="col"
                            class="px-6 py-3 text-left text-xs text-black uppercase font-bold tracking-wider">
                            Finished
                            At</th>
                    </tr>
                </thead>
                <tbody class="bg-white divide-y divide-gray-200">
                    <!-- Job rows will go here -->
                </tbody>
            </table>
        </div>
    </div>
</div>
{{end}}
