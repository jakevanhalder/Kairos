{{template "base.html" .}}

{{define "title"}}Kairos{{end}}

{{define "content"}}
<div class="flex flex-col gap-10 p-8">
    <div>
        <div class="flex items-center gap-2 pb-8">
            <a href="?" class="px-3 py-1 rounded text-sm font-medium {{filterClass .FilterStatus ``}}">All</a>
            <a href="?status=pending"
                class="px-3 py-1 rounded text-sm font-medium {{filterClass .FilterStatus `pending`}}">Pending</a>
            <a href="?status=running"
                class="px-3 py-1 rounded text-sm font-medium {{filterClass .FilterStatus `running`}}">Running</a>
            <a href="?status=done"
                class="px-3 py-1 rounded text-sm font-medium {{filterClass .FilterStatus `done`}}">Done</a>
            <a href="?status=failed"
                class="px-3 py-1 rounded text-sm font-medium {{filterClass .FilterStatus `failed`}}">Failed</a>
            <div class="ml-auto flex items-center gap-4">
                <input type="search" placeholder="Search..." aria-label="Search jobs"
                    class="px-3 py-1 text-sm border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-emerald-500" />
                <div class="flex justify-end">
                    <button class="px-4 py-2 bg-emerald-500 text-white rounded cursor-pointer hover:bg-emerald-600">New
                        Job</button>
                </div>
            </div>
        </div>
        <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th scope="col"
                            class="px-6 py-3 text-left text-xs text-black uppercase font-bold tracking-wider">ID
                        </th>
                        <th scope="col"
                            class="px-6 py-3 text-left text-xs text-black uppercase font-bold tracking-wider">Name
                        </th>
                        <th scope="col"
                            class="px-6 py-3 text-left text-xs text-black uppercase font-bold tracking-wider">
                            Status
                        </th>
                        <th scope="col"
                            class="px-6 py-3 text-left text-xs text-black uppercase font-bold tracking-wider">
                            Started
                            At</th>
                        <th scope="col"
                            class="px-6 py-3 text-left text-xs text-black uppercase font-bold tracking-wider">
                            Finished
                            At</th>
                    </tr>
                </thead>
                <tbody class="bg-white divide-y divide-gray-200">
                    <!-- Job rows will go here -->
                </tbody>
            </table>
        </div>
    </div>
</div>
{{end}}
